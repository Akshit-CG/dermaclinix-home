<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermaClinix</title>
    <!-- font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- css -->
    <link rel="stylesheet" href="./css/output.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

</head>

<body class="bg-white h-screen">
    <section class="slider-section">
        <div class="swiper heroSwiper w-full ">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <img src="/assets/images/hero-1.png" alt="Hero 1" class="w-full" />
                </div>

                <div class="swiper-slide">
                    <img src="/assets/images/hero-2.png" alt="Hero 2" class="w-full" />
                </div>
            </div>

            <div class="swiper-button-prev text-white left-6 after:text-3xl"></div>

            <div class="swiper-button-next text-white right-6 after:text-3xl"></div>
        </div>
    </section>
    <section class="news-logo-section">
        <div class="swiper logoSwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide news-logo-slide">
                    <img src="./assets/images/cnn-logo.png" alt="CNN" class="news-logo-img">
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>
                <div class="swiper-slide news-logo-slide">
                    <img src="./assets/images/times-logo.png" alt="Times Now" class="news-logo-img">
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>
                <div class="swiper-slide news-logo-slide">
                    <img src="./assets/images/Forbes-logo.png" alt="Forbes" class="news-logo-img">
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>
                <div class="swiper-slide news-logo-slide">
                    <img src="./assets/images/cnn-logo.png" alt="CNN" class="news-logo-img">
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>
                <div class="swiper-slide news-logo-slide">
                    <span class="news-logo-html" aria-label="Dainik Bhaskar">
                        <span class="db-logo">दैनिक<br>भास्कर</span>
                    </span>
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>
                <div class="swiper-slide news-logo-slide">
                    <img src="./assets/images/ht-logo.png" alt="Hindustan Times" class="news-logo-img">
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>
                <div class="swiper-slide news-logo-slide">
                    <img src="./assets/images/indiatv-logo.png" alt="India TV" class="news-logo-img">
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>
                <div class="swiper-slide news-logo-slide">
                    <span class="news-logo-html" aria-label="NDTV">
                        <span class="ndtv-logo"><span>N</span>NDTV</span>
                    </span>
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>

                <div class="swiper-slide news-logo-slide" aria-hidden="true">
                    <img src="./assets/images/cnn-logo.png" alt="" class="news-logo-img">
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>
                <div class="swiper-slide news-logo-slide" aria-hidden="true">
                    <img src="./assets/images/times-logo.png" alt="" class="news-logo-img">
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>
                <div class="swiper-slide news-logo-slide" aria-hidden="true">
                    <img src="./assets/images/Forbes-logo.png" alt="" class="news-logo-img">
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>
                <div class="swiper-slide news-logo-slide" aria-hidden="true">
                    <img src="./assets/images/cnn-logo.png" alt="" class="news-logo-img">
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>
                <div class="swiper-slide news-logo-slide" aria-hidden="true">
                    <span class="news-logo-html">
                        <span class="db-logo">दैनिक<br>भास्कर</span>
                    </span>
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>
                <div class="swiper-slide news-logo-slide" aria-hidden="true">
                    <img src="./assets/images/ht-logo.png" alt="" class="news-logo-img">
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>
                <div class="swiper-slide news-logo-slide" aria-hidden="true">
                    <img src="./assets/images/indiatv-logo.png" alt="" class="news-logo-img">
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>
                <div class="swiper-slide news-logo-slide" aria-hidden="true">
                    <span class="news-logo-html">
                        <span class="ndtv-logo"><span>N</span>NDTV</span>
                    </span>
                    <span class="news-logo-dot" aria-hidden="true"></span>
                </div>
            </div>
        </div>
    </section>
    <section class="section-padded h-screen">
        comming soon
    </section>
    <!-- js -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
