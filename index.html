<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermaClinix</title>
    <!-- font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- css -->
    <link rel="stylesheet" href="./css/output.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <!-- Prefetch news logo images (low priority, loads after critical resources) -->
    <link rel="prefetch" href="./assets/images/cnn-logo.png" as="image">
    <link rel="prefetch" href="./assets/images/times-logo.png" as="image">
    <link rel="prefetch" href="./assets/images/Forbes-logo.png" as="image">
    <link rel="prefetch" href="./assets/images/dainik-logo 1.png" as="image">
    <link rel="prefetch" href="./assets/images/ht-logo.png" as="image">
    <link rel="prefetch" href="./assets/images/indiatv-logo.png" as="image">
    <link rel="prefetch" href="./assets/images/indiatv-logo.png" as="image">

</head>

<body class="bg-white h-screen">
    <section class="slider-section ">
        <div class="swiper heroSwiper w-full ">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <img src="/assets/images/hero-1.png" alt="Hero 1" class="w-full" />
                </div>

                <div class="swiper-slide">
                    <img src="/assets/images/hero-2.png" alt="Hero 2" class="w-full" />
                </div>
            </div>

            <div class="swiper-button-prev text-white left-6 after:text-3xl"></div>

            <div class="swiper-button-next text-white right-6 after:text-3xl"></div>
        </div>
    </section>
    <section class="news-logo-section ">
        <div class="news-logo-container">
            <div class="swiper logoSwiper">
                <div class="swiper-wrapper" id="logoWrapper">
                    <!-- Slides will be populated dynamically -->
                </div>
            </div>
        </div>
    </section>
    <section class="section-padded h-screen">
        comming soon
    </section>
    <!-- js -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
