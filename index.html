<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermaClinix</title>
    <!-- css -->
    <link rel="stylesheet" href="./src/output.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

</head>

<body class="bg-white">
    <section class="slider-section">
        <div class="swiper heroSwiper w-full h-screen">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <img src="src/assets/images/hero-1.png" alt="Hero 1" class="w-full" />
                </div>

                <div class="swiper-slide">
                    <img src="src/assets/images/hero-2.png" alt="Hero 2" class="w-full" />
                </div>
            </div>

            <div class="swiper-button-prev text-white left-6 after:text-3xl"></div>

            <div class="swiper-button-next text-white right-6 after:text-3xl"></div>
        </div>
    </section>
    <section class="section-padded h-screen">
        comming soon
    </section>
    <!-- js -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
